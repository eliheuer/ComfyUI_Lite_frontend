# Gruvbox Dark for Comfy Lite
# Based on the Retro Groove Color Scheme by Pavel Pertsev
# https://github.com/morhetz/gruvbox

[meta]
name        = "Gruvbox Dark"
author      = "morhetz"
description = "Retro groove color scheme. Warm, muted, easy on the eyes."
mood        = "dark"

# ─── Colors ─────────────────────────────────────────────────────
[colors]
bg            = "#282828"
surface       = "#3c3836"
surface-alt   = "#504945"
text          = "#ebdbb2"
text-muted    = "#a89984"
text-disabled = "#665c54"
border        = "#504945"
border-strong = "#7c6f64"
focus         = "#fabd2f"

action        = "#fabd2f"
action-fg     = "#282828"
danger        = "#fb4934"
danger-fg     = "#282828"
warning       = "#fe8019"
success       = "#b8bb26"

canvas-bg     = "#1d2021"
canvas-grid   = "rgb(60 56 54 / 0.4)"
node-bg       = "#3c3836"
node-header   = "#504945"
node-text     = "#ebdbb2"
node-border   = "#665c54"
node-selected = "#fabd2f"
node-error    = "#fb4934"

[colors.links]
model        = "#d3869b"
image        = "#83a598"
latent       = "#d3869b"
conditioning = "#fabd2f"
mask         = "#b8bb26"
clip         = "#fabd2f"
vae          = "#fb4934"
control-net  = "#b8bb26"
string       = "#a89984"
int          = "#458588"
float        = "#83a598"
bool         = "#fb4934"
