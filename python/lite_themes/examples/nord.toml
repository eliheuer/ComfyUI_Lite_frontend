# Nord for Comfy Lite
# Arctic, north-bluish color palette
# https://www.nordtheme.com/

[meta]
name        = "Nord"
author      = "Arctic Ice Studio"
description = "Arctic, north-bluish. Cool, calm, distinctly Scandinavian."
mood        = "dark"

[colors]
bg            = "#2e3440"  # nord0 — polar night, darkest
surface       = "#3b4252"  # nord1
surface-alt   = "#434c5e"  # nord2
text          = "#eceff4"  # nord6 — snow storm, lightest
text-muted    = "#d8dee9"  # nord4
text-disabled = "#4c566a"  # nord3
border        = "#4c566a"
border-strong = "#5e81ac"  # nord10 — frost
focus         = "#88c0d0"  # nord8 — frost

action        = "#88c0d0"  # nord8 — bright cyan
action-fg     = "#2e3440"
danger        = "#bf616a"  # nord11 — aurora red
danger-fg     = "#eceff4"
warning       = "#ebcb8b"  # nord13 — aurora yellow
success       = "#a3be8c"  # nord14 — aurora green

canvas-bg     = "#242933"
canvas-grid   = "rgb(216 222 233 / 0.04)"
node-bg       = "#3b4252"
node-header   = "#434c5e"
node-text     = "#eceff4"
node-border   = "#4c566a"
node-selected = "#88c0d0"
node-error    = "#bf616a"

[colors.links]
model        = "#b48ead"  # aurora purple
image        = "#88c0d0"  # frost cyan
latent       = "#b48ead"
conditioning = "#ebcb8b"  # aurora yellow
mask         = "#a3be8c"  # aurora green
clip         = "#ebcb8b"
vae          = "#bf616a"  # aurora red
control-net  = "#a3be8c"
string       = "#d8dee9"
int          = "#5e81ac"  # frost dark blue
float        = "#81a1c1"  # frost mid blue
bool         = "#bf616a"
