# Tokyo Night for Comfy Lite
# A clean, dark theme that celebrates the lights of downtown Tokyo at night
# https://github.com/enkia/tokyo-night-vscode-theme

[meta]
name        = "Tokyo Night"
author      = "enkia"
description = "Neon-tinged dark theme inspired by downtown Tokyo at night."
mood        = "dark"

[colors]
bg            = "#1a1b26"
surface       = "#24283b"
surface-alt   = "#2f334d"
text          = "#c0caf5"
text-muted    = "#9aa5ce"
text-disabled = "#565f89"
border        = "#414868"
border-strong = "#565f89"
focus         = "#7aa2f7"

action        = "#bb9af7"  # vibrant purple
action-fg     = "#1a1b26"
danger        = "#f7768e"
danger-fg     = "#1a1b26"
warning       = "#e0af68"
success       = "#9ece6a"

canvas-bg     = "#16161e"
canvas-grid   = "rgb(122 162 247 / 0.04)"
node-bg       = "#24283b"
node-header   = "#1f2335"
node-text     = "#c0caf5"
node-border   = "#414868"
node-selected = "#bb9af7"
node-error    = "#f7768e"

[colors.links]
model        = "#bb9af7"  # purple
image        = "#7dcfff"  # bright cyan
latent       = "#bb9af7"
conditioning = "#e0af68"  # orange
mask         = "#9ece6a"  # green
clip         = "#e0af68"
vae          = "#f7768e"  # pink-red
control-net  = "#9ece6a"
string       = "#9aa5ce"
int          = "#7aa2f7"  # blue
float        = "#7dcfff"  # cyan
bool         = "#f7768e"
